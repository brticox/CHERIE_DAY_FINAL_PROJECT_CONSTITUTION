# CHERIE DAY — Supabase local config (docs/29).
# `project_id` is a local identifier; link a real project with `supabase link`.
project_id = "cherie-day"

[db]
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[storage]
enabled = true

[auth]
enable_signup = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]

[auth.email]
enable_confirmations = true
double_confirm_changes = true

[auth.email.template.confirmation]
subject = "E-posta adresinizi doğrulayın — CHERIE DAY"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Şifrenizi yenileyin — CHERIE DAY"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.email_change]
subject = "Yeni e-posta adresinizi doğrulayın — CHERIE DAY"
content_path = "./supabase/templates/email-change.html"

[auth.email.template.magic_link]
subject = "Güvenli giriş bağlantınız — CHERIE DAY"
content_path = "./supabase/templates/magic-link.html"

[auth.email.template.invite]
subject = "CHERIE DAY Maison hesabı davetiniz"
content_path = "./supabase/templates/invite.html"

[auth.email.template.reauthentication]
subject = "Güvenlik doğrulama kodunuz — CHERIE DAY"
content_path = "./supabase/templates/reauthentication.html"

[auth.external.google]
enabled = false

[auth.external.apple]
enabled = false
